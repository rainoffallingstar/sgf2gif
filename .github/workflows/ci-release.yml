name: CI and Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  release:
    name: Release daily builds
    needs: test
    if: github.event_name != 'pull_request' && (github.ref_name == 'master' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute daily release metadata
        id: meta
        env:
          TZ: Asia/Shanghai
        run: |
          echo "release_tag=$(date +%F)" >> "$GITHUB_OUTPUT"
          echo "release_title=Release $(date +%F)" >> "$GITHUB_OUTPUT"

      - name: Build release archives
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail

          mkdir -p dist
          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"

            bin_name="sgf2gif"
            if [ "$goos" = "windows" ]; then
              bin_name="${bin_name}.exe"
            fi

            package="sgf2gif_${RELEASE_TAG}_${goos}_${goarch}"
            workdir="dist/${package}"
            mkdir -p "$workdir"

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" -o "${workdir}/${bin_name}" .

            cp README.md LICENSE "$workdir"/

            if [ "$goos" = "windows" ]; then
              (
                cd dist
                zip -rq "${package}.zip" "${package}"
              )
            else
              tar -C dist -czf "dist/${package}.tar.gz" "${package}"
            fi

            rm -rf "$workdir"
          done

          (
            cd dist
            sha256sum ./* > sha256sums.txt
          )

      - name: Move daily tag to current commit
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$RELEASE_TAG"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.release_title }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat <<EOF > "$notes_file"
          Automated daily build for ${RELEASE_TAG}.

          - Branch: \`${GITHUB_REF_NAME}\`
          - Commit: \`${GITHUB_SHA}\`
          - Time zone: \`Asia/Shanghai\`

          Multiple builds on the same day reuse this tag and replace the attached artifacts.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file "$notes_file"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file "$notes_file"
          fi

          gh release upload "$RELEASE_TAG" dist/* --clobber
